<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vivo V60 Ultra Camera - Advanced</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MediaPipe for Face and Hand tracking -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: white;
            overflow: hidden;
            margin: 0;
            height: 100vh;
            touch-action: none;
        }

        .camera-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
            overflow: hidden;
        }

        #video-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.1s ease-out;
        }

        canvas#overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .zoom-dial-wrapper {
            position: absolute;
            bottom: 220px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 80px;
            overflow: hidden;
            mask-image: linear-gradient(to right, transparent, black 20%, black 80%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 20%, black 80%, transparent);
            z-index: 40;
        }

        #zoomDial {
            display: flex;
            align-items: flex-end;
            gap: 15px;
            padding: 0 150px;
            height: 100%;
            transition: transform 0.1s ease-out;
            cursor: grab;
        }

        .dial-tick {
            min-width: 2px;
            height: 20px;
            background: rgba(255, 255, 255, 0.4);
            flex-shrink: 0;
        }

        .dial-tick.major {
            height: 35px;
            background: white;
            position: relative;
        }

        .dial-tick.major::after {
            content: attr(data-value);
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: white;
        }

        .zoom-indicator {
            position: absolute;
            bottom: 215px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 50px;
            background: #FFB800;
            z-index: 45;
            box-shadow: 0 0 10px rgba(255, 184, 0, 0.5);
        }

        .shutter-btn {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            border: 4px solid white;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shutter-inner {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            transition: transform 0.1s;
        }

        .mode-item {
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: rgba(255,255,255,0.5);
            transition: 0.3s;
        }

        .mode-item.active {
            color: #FFB800;
        }

        /* Settings Panel Styling */
        #settingsPanel {
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #settingsPanel.open {
            transform: translateY(0);
        }

        .finger-tracker {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid #FFB800;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 20;
            pointer-events: none;
        }

        .finger-tracker::before, .finger-tracker::after {
            content: '';
            position: absolute;
            background: #FFB800;
        }

        .finger-tracker::before { width: 100%; height: 1px; top: 50%; left: 0; }
        .finger-tracker::after { height: 100%; width: 1px; left: 50%; top: 0; }

        .flash-overlay {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            z-index: 100;
            pointer-events: none;
        }
        
        .animate-flash { animation: flash 0.3s ease-out; }
        @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }

        .glass { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); }
    </style>
</head>
<body>

    <div class="camera-container">
        <div id="video-container">
            <video id="webcam" autoplay playsinline></video>
        </div>
        <canvas id="overlay"></canvas>
        <div id="fingerTracker" class="finger-tracker"></div>
        <div id="flashOverlay" class="flash-overlay"></div>

        <!-- Top Navigation -->
        <div class="absolute top-0 left-0 w-full p-5 flex justify-between items-center z-30">
            <button onclick="toggleSettings()" class="p-2"><i data-lucide="settings" class="w-6 h-6"></i></button>
            <div class="flex gap-8 items-center bg-black/20 px-4 py-2 rounded-full backdrop-blur-md">
                <button id="flashToggle" onclick="cycleFlash()"><i data-lucide="zap-off" class="w-5 h-5"></i></button>
                <div class="w-[1px] h-4 bg-white/20"></div>
                <button id="gestureToggle" onclick="toggleGesture()" class="flex flex-col items-center">
                    <i data-lucide="hand" class="w-5 h-5"></i>
                    <span class="text-[7px] font-bold mt-1">GESTURE</span>
                </button>
                <div class="w-[1px] h-4 bg-white/20"></div>
                <button id="timerToggle" onclick="cycleTimer()" class="relative">
                    <i data-lucide="timer" class="w-5 h-5"></i>
                    <span id="timerVal" class="text-[7px] font-bold absolute -bottom-3 left-1/2 -translate-x-1/2">OFF</span>
                </button>
            </div>
            <div class="w-10"></div>
        </div>

        <!-- Zoom Dial (Vivo Style) -->
        <div class="absolute bottom-[310px] left-1/2 -translate-x-1/2 text-center z-30">
            <span id="zoomLabel" class="text-[#FFB800] text-sm font-bold bg-black/40 px-3 py-1 rounded-full border border-white/10">1.0x</span>
        </div>
        
        <div class="zoom-indicator"></div>
        <div class="zoom-dial-wrapper" id="dialTouchArea">
            <div id="zoomDial">
                <!-- Ticks will be generated by JS -->
            </div>
        </div>

        <!-- Bottom UI -->
        <div class="absolute bottom-0 left-0 w-full z-30 pb-8 glass rounded-t-[40px]">
            <!-- Mode Selector -->
            <div class="flex overflow-x-auto justify-center items-center py-4 px-2 gap-2 scrollbar-hide">
                <div class="mode-item" onclick="setMode('NIGHT')">NIGHT</div>
                <div class="mode-item" onclick="setMode('PORTRAIT')">PORTRAIT</div>
                <div class="mode-item active" onclick="setMode('PHOTO')">PHOTO</div>
                <div class="mode-item" onclick="setMode('VIDEO')">VIDEO</div>
                <div class="mode-item" onclick="setMode('PRO')">PRO</div>
            </div>

            <div class="px-10 flex justify-between items-center mt-2">
                <!-- Gallery -->
                <div class="w-14 h-14 rounded-full border-2 border-white/20 overflow-hidden bg-zinc-800" onclick="openGallery()">
                    <img id="galleryThumb" src="https://placehold.co/100x100/333/fff?text=IMG" class="w-full h-full object-cover">
                </div>

                <!-- Shutter -->
                <button class="shutter-btn" onclick="triggerCapture()">
                    <div id="shutterInner" class="shutter-inner"></div>
                </button>

                <!-- Switch Camera -->
                <button class="w-14 h-14 flex items-center justify-center bg-white/10 rounded-full" onclick="switchCamera()">
                    <i data-lucide="refresh-cw" class="w-7 h-7"></i>
                </button>
            </div>
        </div>

        <!-- Settings Panel -->
        <div id="settingsPanel" class="fixed inset-0 bg-black z-50 p-6 flex flex-col">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-xl font-bold">Kustom Pengaturan</h2>
                <button onclick="toggleSettings()" class="bg-white/10 p-2 rounded-full"><i data-lucide="x"></i></button>
            </div>

            <div class="space-y-6">
                <div class="flex justify-between items-center p-4 bg-zinc-900 rounded-2xl">
                    <div>
                        <p class="font-medium">Kualitas Gambar</p>
                        <p class="text-xs text-white/50">Ultra HD (V60 Optimization)</p>
                    </div>
                    <span class="text-yellow-500 font-bold">MAX</span>
                </div>

                <div class="flex justify-between items-center p-4 bg-zinc-900 rounded-2xl">
                    <div>
                        <p class="font-medium">Grid Lines</p>
                        <p class="text-xs text-white/50">Membantu komposisi foto</p>
                    </div>
                    <div class="w-12 h-6 bg-zinc-700 rounded-full relative p-1">
                        <div class="w-4 h-4 bg-white rounded-full"></div>
                    </div>
                </div>

                <div class="flex justify-between items-center p-4 bg-zinc-900 rounded-2xl">
                    <div>
                        <p class="font-medium">Suara Shutter</p>
                        <p class="text-xs text-white/50">Efek suara kamera DSLR</p>
                    </div>
                    <div class="w-12 h-6 bg-yellow-500 rounded-full relative p-1 flex justify-end">
                        <div class="w-4 h-4 bg-white rounded-full"></div>
                    </div>
                </div>

                <div class="flex justify-between items-center p-4 bg-zinc-900 rounded-2xl">
                    <div>
                        <p class="font-medium">Pelacakan Telunjuk</p>
                        <p class="text-xs text-white/50">Tracker otomatis di ujung jari</p>
                    </div>
                    <span class="text-xs text-green-500 font-bold uppercase">Selalu Aktif</span>
                </div>
            </div>

            <div class="mt-auto text-center pb-6">
                <p class="text-[10px] text-white/30 uppercase tracking-widest">Vivo V60 Pro Camera Engine v4.2</p>
            </div>
        </div>

        <!-- Timer Overlay -->
        <div id="timerDisplay" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-8xl font-bold text-white hidden z-50 drop-shadow-lg"></div>
    </div>

    <script>
        lucide.createIcons();

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        const zoomDial = document.getElementById('zoomDial');
        const zoomLabel = document.getElementById('zoomLabel');
        const fingerTracker = document.getElementById('fingerTracker');
        
        let currentStream;
        let isFrontCamera = true;
        let currentZoom = 1.0;
        let gestureEnabled = false;
        let hands;
        let faceDetection;

        // Initialize Zoom Dial Ticks
        function initZoomDial() {
            // Create ticks for 1x to 100x
            // Since 100x is huge, we use a non-linear or segmented scale
            // Major points: 1x, 2x, 5x, 10x, 20x, 50x, 100x
            const majors = [1, 2, 5, 10, 20, 50, 100];
            for(let i=0; i<=100; i++) {
                const tick = document.createElement('div');
                tick.className = 'dial-tick';
                if(majors.includes(i)) {
                    tick.classList.add('major');
                    tick.setAttribute('data-value', i + 'x');
                }
                zoomDial.appendChild(tick);
            }
        }

        let startX, scrollLeft;
        let isDragging = false;

        document.getElementById('dialTouchArea').addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].pageX - zoomDial.offsetLeft;
            scrollLeft = currentZoom; 
        });

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const x = e.touches[0].pageX - zoomDial.offsetLeft;
            const walk = (x - startX) * 0.1; // sensitivity
            
            let targetZoom = Math.max(1, Math.min(100, currentZoom - walk));
            updateZoom(targetZoom);
        });

        document.addEventListener('touchend', () => isDragging = false);

        // PC Compatibility
        document.getElementById('dialTouchArea').addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.pageX - zoomDial.offsetLeft;
        });
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const x = e.pageX - zoomDial.offsetLeft;
            const walk = (x - startX) * 0.1;
            updateZoom(Math.max(1, Math.min(100, currentZoom - walk)));
        });
        document.addEventListener('mouseup', () => isDragging = false);

        function updateZoom(val) {
            currentZoom = val;
            zoomLabel.innerText = currentZoom.toFixed(1) + 'x';
            
            // Move the dial UI
            // Offset logic: roughly -17px per tick
            const offset = (currentZoom - 1) * -17;
            zoomDial.style.transform = `translateX(${offset}px)`;
            
            // Apply zoom to video
            const mirror = isFrontCamera ? 'scaleX(-1)' : 'scaleX(1)';
            video.style.transform = `${mirror} scale(${1 + (currentZoom - 1) * 0.1})`; 
            // Note: 100x digital zoom is clamped in actual css scale for usability
        }

        async function initCamera() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            const constraints = { video: { facingMode: isFrontCamera ? 'user' : 'environment' } };
            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    startTracking();
                };
            } catch (e) {
                console.error(e);
            }
        }

        async function startTracking() {
            faceDetection = new FaceDetection({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
            });
            faceDetection.setOptions({ model: 'short', minDetectionConfidence: 0.5 });
            faceDetection.onResults(onFaceResults);

            hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });
            hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6 });
            hands.onResults(onHandResults);

            processFrames();
        }

        async function processFrames() {
            if (video.paused || video.ended) return;
            await faceDetection.send({ image: video });
            await hands.send({ image: video });
            requestAnimationFrame(processFrames);
        }

        function onFaceResults(results) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (results.detections.length > 0) {
                results.detections.forEach(det => {
                    const box = det.boundingBox;
                    const x = box.xCenter * canvas.width - (box.width * canvas.width) / 2;
                    const y = box.yCenter * canvas.height - (box.height * canvas.height) / 2;
                    const w = box.width * canvas.width;
                    const h = box.height * canvas.height;
                    
                    ctx.strokeStyle = '#FFB800';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.strokeRect(x, y, w, h);
                    ctx.setLineDash([]);
                });
            }
        }

        function onHandResults(results) {
            let indexFingerFound = false;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                
                // Identify Index Finger Pointing Gesture
                // Tip of index (8) must be higher than middle (12), ring (16) etc.
                const isPointing = hand[8].y < hand[6].y && 
                                  hand[12].y > hand[10].y && 
                                  hand[16].y > hand[14].y;

                if (isPointing) {
                    indexFingerFound = true;
                    // Mirroring logic
                    const posX = isFrontCamera ? (1 - hand[8].x) * 100 : hand[8].x * 100;
                    const posY = hand[8].y * 100;
                    
                    fingerTracker.style.display = 'block';
                    fingerTracker.style.left = posX + '%';
                    fingerTracker.style.top = posY + '%';
                }

                // Palm Gesture for Capture
                const isPalm = hand[8].y < hand[6].y && hand[12].y < hand[10].y && hand[4].y < hand[3].y;
                if (isPalm && gestureEnabled && !window.isCapturing) {
                    triggerCapture();
                }
            }

            if (!indexFingerFound) {
                fingerTracker.style.display = 'none';
            }
        }

        // UI Handlers
        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('open');
        }

        function triggerCapture() {
            window.isCapturing = true;
            document.getElementById('flashOverlay').classList.add('animate-flash');
            setTimeout(() => {
                document.getElementById('flashOverlay').classList.remove('animate-flash');
                window.isCapturing = false;
            }, 500);

            // Shutter animation
            const inner = document.getElementById('shutterInner');
            inner.style.transform = 'scale(0.8)';
            setTimeout(() => inner.style.transform = 'scale(1)', 100);

            // Mock saving photo
            console.log("Photo Captured at " + currentZoom + "x zoom");
        }

        function switchCamera() {
            isFrontCamera = !isFrontCamera;
            updateZoom(1.0);
            initCamera();
        }

        function toggleGesture() {
            gestureEnabled = !gestureEnabled;
            document.getElementById('gestureToggle').classList.toggle('text-[#FFB800]', gestureEnabled);
        }

        let timerSeconds = 0;
        function cycleTimer() {
            const list = [0, 3, 5, 10];
            timerSeconds = list[(list.indexOf(timerSeconds) + 1) % list.length];
            document.getElementById('timerVal').innerText = timerSeconds === 0 ? 'OFF' : timerSeconds + 'S';
            document.getElementById('timerToggle').classList.toggle('text-yellow-500', timerSeconds > 0);
        }

        function setMode(mode) {
            document.querySelectorAll('.mode-item').forEach(m => {
                m.classList.remove('active');
                if(m.innerText === mode) m.classList.add('active');
            });
        }

        window.onload = () => {
            initZoomDial();
            initCamera();
        };

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AXIOM CAM</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --cyan: #00e5ff;
  --cyan2: #00b8cc;
  --red: #ff3d3d;
  --white: #f2f2f0;
  --muted: rgba(255,255,255,0.4);
  --glass: rgba(0,0,0,0.55);
  --glass2: rgba(0,0,0,0.75);
  --border: rgba(255,255,255,0.12);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Rajdhani', sans-serif;
  color: var(--white);
  touch-action: none;
}

/* ══ VIEWFINDER ══ */
#viewfinder {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: #000;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

#video {
  width: 100%; height: 100%;
  object-fit: cover;
  transform-origin: center center;
  transition: transform 0.05s linear;
  will-change: transform;
}

/* Filters */
.f-none     { filter: none; }
.f-bw       { filter: grayscale(1) contrast(1.1); }
.f-warm     { filter: sepia(.55) saturate(1.4) brightness(1.05); }
.f-cool     { filter: hue-rotate(195deg) saturate(1.25); }
.f-vivid    { filter: saturate(2.4) contrast(1.15); }
.f-noir     { filter: grayscale(1) contrast(1.7) brightness(.82); }
.f-fade     { filter: contrast(.82) brightness(1.12) saturate(.55); }
.f-drama    { filter: contrast(1.5) brightness(.88) saturate(1.1); }
.f-chrome   { filter: saturate(1.8) contrast(1.3) hue-rotate(10deg); }
.f-mist     { filter: brightness(1.15) contrast(.85) saturate(.7) blur(0.4px); }

.mirrored   { transform-origin: center center; }

/* ══ OVERLAYS ══ */
#flash-ov {
  position: fixed; inset: 0; z-index: 90;
  background: #fff; opacity: 0; pointer-events: none;
  transition: opacity 0.06s;
}

#focus-ring {
  position: fixed; z-index: 30;
  width: 72px; height: 72px;
  border: 2px solid var(--cyan);
  border-radius: 4px;
  transform: translate(-50%,-50%);
  opacity: 0; pointer-events: none;
  transition: opacity .1s, width .15s, height .15s;
}
#focus-ring.show { opacity: 1; }
#focus-ring::before, #focus-ring::after {
  content: '';
  position: absolute;
  background: var(--cyan);
}
#focus-ring::before { top:50%; left:-6px; right:-6px; height:1px; }
#focus-ring::after  { left:50%; top:-6px; bottom:-6px; width:1px; }

/* Grid */
#grid-ov {
  position: fixed; inset: 0; z-index: 20; pointer-events: none;
  opacity: 0; transition: opacity .3s;
}
#grid-ov.on { opacity: 1; }
#grid-ov::before, #grid-ov::after { content:''; position:absolute; }
#grid-ov::before {
  left:33.33%; top:0; bottom:0; width:1px;
  box-shadow: 0 0 0 .5px rgba(255,255,255,.25), calc(33.33vw) 0 0 .5px rgba(255,255,255,.25);
  background: rgba(255,255,255,.25);
}
#grid-ov::after {
  top:33.33%; left:0; right:0; height:1px;
  box-shadow: 0 calc(33.33vh) 0 .5px rgba(255,255,255,.25);
  background: rgba(255,255,255,.25);
}

/* Corners */
.corners { position:fixed; inset:0; pointer-events:none; z-index:25; }
.c { position:absolute; width:22px; height:22px; border-color:var(--cyan); border-style:solid; border-width:0; opacity:.7; }
.c.tl { top:16px; left:16px; border-top-width:2px; border-left-width:2px; }
.c.tr { top:16px; right:16px; border-top-width:2px; border-right-width:2px; }
.c.bl { bottom:calc(16px + var(--safe-bot)); left:16px; border-bottom-width:2px; border-left-width:2px; }
.c.br { bottom:calc(16px + var(--safe-bot)); right:16px; border-bottom-width:2px; border-right-width:2px; }

/* Timer countdown */
#timer-big {
  position: fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  font-size: 140px; font-weight:700; color:var(--cyan);
  text-shadow: 0 0 60px rgba(0,229,255,.5);
  display:none; z-index:80; pointer-events:none;
  font-family:'Rajdhani',sans-serif;
  line-height:1;
}

/* ══ TOP HUD ══ */
#top-hud {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 40;
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(to bottom, rgba(0,0,0,.7) 0%, transparent 100%);
}

.hud-pill {
  background: var(--glass);
  border: 1px solid var(--border);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 12px;
  font-family: 'Courier Prime', monospace;
  letter-spacing: .5px;
  display: flex; align-items: center; gap:6px;
}

.rec-dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--red);
  animation: blink 1.1s infinite;
  display:none;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

#hud-mode { color:var(--cyan); font-weight:700; font-size:13px; }
#hud-filter-name { color:var(--muted); font-size:11px; }
#hud-time { color:var(--white); font-size:12px; }

/* top icon buttons */
.top-icon {
  width:40px; height:40px;
  background:var(--glass);
  border:1px solid var(--border);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:17px;
  cursor:pointer;
  transition: background .15s;
  border:none;
  color:var(--white);
}
.top-icon.active { color:var(--cyan); }
.top-icon:active { background:rgba(0,229,255,.15); }

/* ══ ZOOM ARC ══ */
#zoom-hud {
  position:fixed;
  left:50%;
  bottom: calc(240px + var(--safe-bot));
  transform:translateX(-50%);
  z-index:40;
  display:flex;
  align-items:center;
  gap:8px;
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;
}
#zoom-hud.show { opacity:1; pointer-events:auto; }

.zoom-badge {
  background:var(--glass2);
  border:1px solid var(--border);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border-radius:20px;
  padding:6px 14px;
  font-family:'Courier Prime',monospace;
  font-size:20px;
  color:var(--cyan);
  letter-spacing:1px;
  min-width:90px;
  text-align:center;
}

#zoom-slider-wrap {
  position:fixed;
  left:50%;
  bottom:calc(192px + var(--safe-bot));
  transform:translateX(-50%);
  z-index:40;
  width:80vw;
  max-width:340px;
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
}
#zoom-slider-wrap.show { opacity:1; pointer-events:auto; }

.zoom-track {
  width:100%;
  height:3px;
  background:rgba(255,255,255,.15);
  border-radius:2px;
  position:relative;
}
#zoom-fill {
  height:100%;
  background:linear-gradient(to right,var(--cyan2),var(--cyan));
  border-radius:2px;
  width:0%;
  transition:width .05s;
}
#zoom-input {
  position:absolute;
  inset:0;
  margin:-12px 0;
  width:100%;
  opacity:0;
  cursor:pointer;
  height:40px;
}

.zoom-marks {
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 2px;
}
.zoom-marks span {
  font-size:9px;
  color:var(--muted);
  font-family:'Courier Prime',monospace;
}
.zoom-marks span.active { color:var(--cyan); }

/* ══ FILTER CAROUSEL ══ */
#filter-bar {
  position:fixed;
  bottom:calc(168px + var(--safe-bot));
  left:0; right:0;
  z-index:40;
  overflow:hidden;
}

.filter-scroll {
  display:flex;
  gap:10px;
  padding:8px 20px;
  overflow-x:auto;
  scrollbar-width:none;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
}
.filter-scroll::-webkit-scrollbar { display:none; }

.f-chip {
  flex-shrink:0;
  scroll-snap-align:center;
  padding:6px 16px;
  border-radius:20px;
  border:1px solid var(--border);
  background:var(--glass);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  font-size:12px;
  font-weight:600;
  letter-spacing:1px;
  color:var(--muted);
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
}
.f-chip.active {
  color:var(--cyan);
  border-color:var(--cyan2);
  background:rgba(0,229,255,.1);
}

/* ══ BOTTOM CONTROLS ══ */
#bottom-bar {
  position:fixed;
  bottom:0; left:0; right:0;
  z-index:50;
  padding-bottom:calc(16px + var(--safe-bot));
  background: linear-gradient(to top, rgba(0,0,0,.85) 60%, transparent 100%);
}

/* Mode row */
.mode-row {
  display:flex;
  justify-content:center;
  gap:0;
  margin-bottom:16px;
  padding:0 16px;
}

.mode-seg {
  flex:1;
  max-width:90px;
  text-align:center;
  padding:6px 0;
  font-size:12px;
  font-weight:600;
  letter-spacing:2px;
  color:var(--muted);
  cursor:pointer;
  position:relative;
  transition:color .2s;
}
.mode-seg::after {
  content:'';
  position:absolute;
  bottom:-2px; left:50%; transform:translateX(-50%);
  width:0; height:2px;
  background:var(--cyan);
  border-radius:1px;
  transition:width .2s;
}
.mode-seg.active { color:var(--cyan); }
.mode-seg.active::after { width:20px; }

/* Main controls row */
.ctrl-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 28px;
}

/* Thumbnail / last shot */
#last-shot {
  width:54px; height:54px;
  border-radius:10px;
  border:2px solid rgba(255,255,255,.3);
  overflow:hidden;
  background:rgba(255,255,255,.08);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  font-size:20px;
  color:var(--muted);
  flex-shrink:0;
  position:relative;
}
#last-shot img {
  width:100%; height:100%; object-fit:cover;
  display:none;
}
#shot-count {
  position:absolute;
  bottom:2px; right:2px;
  background:rgba(0,0,0,.7);
  font-size:9px;
  color:var(--cyan);
  padding:1px 4px;
  border-radius:3px;
  font-family:'Courier Prime',monospace;
  display:none;
}

/* Shutter */
#shutter {
  width:82px; height:82px;
  border-radius:50%;
  border:3px solid rgba(255,255,255,.8);
  background:transparent;
  cursor:pointer;
  position:relative;
  flex-shrink:0;
  transition:transform .1s;
}
#shutter:active { transform:scale(.91); }
#shutter-inner {
  position:absolute;
  inset:5px;
  border-radius:50%;
  background:#fff;
  transition:all .12s;
}
#shutter.video-mode { border-color:var(--red); }
#shutter.video-mode #shutter-inner { background:var(--red); }
#shutter.recording { border-color:var(--red); }
#shutter.recording #shutter-inner {
  background:var(--red);
  border-radius:10px;
  inset:16px;
}

/* Flip camera */
#btn-flip-cam {
  width:54px; height:54px;
  border-radius:50%;
  background:var(--glass);
  border:1px solid var(--border);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center;
  font-size:24px;
  cursor:pointer;
  flex-shrink:0;
  transition:transform .3s, background .15s;
}
#btn-flip-cam:active { background:rgba(255,255,255,.15); }

/* Timer select */
.timer-row {
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:10px;
}
.t-opt {
  padding:4px 12px;
  border-radius:14px;
  border:1px solid var(--border);
  background:transparent;
  font-size:11px;
  font-weight:600;
  letter-spacing:1px;
  color:var(--muted);
  cursor:pointer;
  transition:all .15s;
}
.t-opt.active { color:var(--cyan); border-color:var(--cyan2); }

/* ══ GALLERY SHEET ══ */
#gallery-sheet {
  position:fixed;
  inset:0;
  z-index:100;
  display:flex;
  flex-direction:column;
  background:#0a0a0a;
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.32,.72,0,1);
  padding-top:calc(var(--safe-top) + 0px);
  padding-bottom:calc(var(--safe-bot));
}
#gallery-sheet.open { transform:translateY(0); }

.sheet-header {
  display:flex; align-items:center;
  justify-content:space-between;
  padding:14px 20px;
  border-bottom:1px solid rgba(255,255,255,.08);
  flex-shrink:0;
}
.sheet-title {
  font-size:18px; font-weight:700;
  letter-spacing:3px; color:var(--cyan);
}

.sheet-close {
  width:36px; height:36px;
  border-radius:50%; border:none;
  background:rgba(255,255,255,.08);
  color:var(--white); font-size:18px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
}

.gallery-photos {
  flex:1; overflow-y:auto;
  padding:10px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:3px;
  -webkit-overflow-scrolling:touch;
}

.g-item {
  aspect-ratio:1;
  border-radius:4px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
}
.g-item img { width:100%; height:100%; object-fit:cover; display:block; }
.g-item .g-num {
  position:absolute; top:3px; left:3px;
  font-size:9px; color:#fff;
  background:rgba(0,0,0,.55); padding:1px 5px;
  border-radius:2px; font-family:'Courier Prime',monospace;
}
.g-item .g-dl {
  position:absolute; bottom:4px; right:4px;
  background:rgba(0,0,0,.65);
  border:none; color:#fff; border-radius:4px;
  padding:3px 8px; font-size:10px; cursor:pointer;
}

/* ══ LIGHTBOX ══ */
#lightbox {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,.95);
  display:none; align-items:center; justify-content:center;
}
#lightbox.on { display:flex; }
#lightbox img { max-width:95%; max-height:90%; border-radius:6px; }
#lb-close {
  position:absolute; top:calc(var(--safe-top)+10px); right:16px;
  width:40px; height:40px; border-radius:50%;
  background:rgba(255,255,255,.1);
  border:none; color:#fff; font-size:20px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
}
#lb-dl {
  position:absolute; bottom:calc(var(--safe-bot)+16px); right:16px;
  background:var(--cyan); color:#000; border:none;
  border-radius:8px; padding:10px 20px;
  font-family:'Rajdhani',sans-serif;
  font-weight:700; font-size:14px; letter-spacing:2px;
  cursor:pointer;
}

/* ══ TOAST ══ */
#toast {
  position:fixed;
  top:50%; left:50%; transform:translate(-50%,-50%) scale(.9);
  background:rgba(0,0,0,.8);
  border:1px solid var(--border);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-radius:10px;
  padding:10px 22px;
  font-size:13px; letter-spacing:2px;
  color:var(--white);
  z-index:300;
  opacity:0; pointer-events:none;
  transition:opacity .25s, transform .25s;
}
#toast.show { opacity:1; transform:translate(-50%,-50%) scale(1); }

/* ══ PERMISSION SCREEN ══ */
#perm-screen {
  position:fixed; inset:0; z-index:500;
  background:#000;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:20px;
  padding:40px;
}
.perm-icon { font-size:72px; opacity:.5; }
.perm-title { font-size:26px; font-weight:700; letter-spacing:4px; color:var(--cyan); }
.perm-sub { font-size:13px; color:var(--muted); text-align:center; line-height:1.7; letter-spacing:.5px; }
#btn-enable {
  margin-top:12px;
  padding:16px 48px;
  background:var(--cyan);
  color:#000;
  border:none;
  border-radius:50px;
  font-family:'Rajdhani',sans-serif;
  font-size:16px; font-weight:700;
  letter-spacing:3px;
  cursor:pointer;
  transition:transform .1s;
}
#btn-enable:active { transform:scale(.96); }

canvas#capture-canvas { display:none; }
</style>
</head>
<body>

<!-- PERMISSION SCREEN -->
<div id="perm-screen">
  <div class="perm-icon">◎</div>
  <div class="perm-title">AXIOM CAM</div>
  <div class="perm-sub">Akses kamera diperlukan.<br>Buka lewat HTTPS agar izin kamera bisa diberikan.</div>
  <button id="btn-enable" onclick="startCam()">AKTIFKAN KAMERA</button>
</div>

<!-- VIEWFINDER -->
<div id="viewfinder">
  <video id="video" autoplay muted playsinline class="f-none"></video>
</div>

<!-- OVERLAYS -->
<div id="flash-ov"></div>
<div id="focus-ring"></div>
<div id="grid-ov"></div>
<div class="corners">
  <div class="c tl"></div><div class="c tr"></div>
  <div class="c bl"></div><div class="c br"></div>
</div>
<div id="timer-big"></div>
<canvas id="capture-canvas"></canvas>

<!-- TOP HUD -->
<div id="top-hud">
  <div class="hud-pill">
    <div class="rec-dot" id="rec-dot"></div>
    <span id="hud-mode">PHOTO</span>
    <span id="hud-filter-name" style="margin-left:4px">· NORMAL</span>
  </div>

  <div style="display:flex;gap:10px;align-items:center">
    <div class="hud-pill">
      <span id="hud-time">--:--</span>
    </div>
    <button class="top-icon" id="btn-grid" onclick="toggleGrid()">⊞</button>
    <button class="top-icon" id="btn-mirror" onclick="toggleMirror()">↔</button>
  </div>
</div>

<!-- ZOOM HUD -->
<div id="zoom-hud">
  <div class="zoom-badge" id="zoom-badge">×1.0</div>
</div>

<!-- ZOOM SLIDER -->
<div id="zoom-slider-wrap">
  <div class="zoom-marks" id="zoom-marks">
    <span>×1</span><span>×5</span><span>×10</span><span>×25</span><span>×50</span><span>×100</span>
  </div>
  <div class="zoom-track">
    <div id="zoom-fill"></div>
    <input type="range" id="zoom-input" min="1" max="100" step="0.5" value="1" oninput="onZoomSlider(this.value)">
  </div>
</div>

<!-- FILTER BAR -->
<div id="filter-bar">
  <div class="filter-scroll" id="filter-scroll">
    <div class="f-chip active" onclick="applyFilter('none','NORMAL',this)">NORMAL</div>
    <div class="f-chip" onclick="applyFilter('bw','B&W',this)">B&W</div>
    <div class="f-chip" onclick="applyFilter('warm','WARM',this)">WARM</div>
    <div class="f-chip" onclick="applyFilter('cool','COOL',this)">COOL</div>
    <div class="f-chip" onclick="applyFilter('vivid','VIVID',this)">VIVID</div>
    <div class="f-chip" onclick="applyFilter('noir','NOIR',this)">NOIR</div>
    <div class="f-chip" onclick="applyFilter('fade','FADE',this)">FADE</div>
    <div class="f-chip" onclick="applyFilter('drama','DRAMA',this)">DRAMA</div>
    <div class="f-chip" onclick="applyFilter('chrome','CHROME',this)">CHROME</div>
    <div class="f-chip" onclick="applyFilter('mist','MIST',this)">MIST</div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div id="bottom-bar">
  <div class="mode-row">
    <div class="mode-seg active" onclick="setMode('PHOTO',this)">PHOTO</div>
    <div class="mode-seg" onclick="setMode('VIDEO',this)">VIDEO</div>
    <div class="mode-seg" onclick="setMode('BURST',this)">BURST</div>
  </div>

  <div class="ctrl-row">
    <!-- Gallery thumbnail -->
    <div id="last-shot" onclick="openGallery()">
      <img id="last-img" src="" alt="">
      <span style="font-size:22px">▤</span>
      <div id="shot-count">0</div>
    </div>

    <!-- Shutter -->
    <button id="shutter" onclick="handleShutter()">
      <div id="shutter-inner"></div>
    </button>

    <!-- Flip -->
    <button id="btn-flip-cam" onclick="flipCam()">⇄</button>
  </div>

  <div class="timer-row">
    <div class="t-opt active" onclick="setTimer(0,this)">OFF</div>
    <div class="t-opt" onclick="setTimer(3,this)">3s</div>
    <div class="t-opt" onclick="setTimer(10,this)">10s</div>
  </div>
</div>

<!-- GALLERY SHEET -->
<div id="gallery-sheet">
  <div class="sheet-header">
    <div class="sheet-title">GALLERY</div>
    <div style="display:flex;gap:10px;align-items:center">
      <div style="font-size:12px;color:var(--muted);font-family:'Courier Prime'" id="photo-count-label">0 PHOTOS</div>
      <button class="sheet-close" onclick="closeGallery()">✕</button>
    </div>
  </div>
  <div class="gallery-photos" id="gallery-photos"></div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lb-img" src="" alt="">
  <button id="lb-dl" onclick="dlLightbox()">⬇ SIMPAN</button>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let stream        = null;
let currentFilter = 'none';
let currentMode   = 'PHOTO';
let timerSecs     = 0;
let isMirrored    = true;
let facingMode    = 'user';
let currentZoom   = 1;
let isRecording   = false;
let mediaRecorder = null;
let recordedChunks= [];
let recInt        = null;
let recSecs       = 0;
let shots         = [];
let lbCurrentUrl  = '';
let zoomVisible   = false;
let zoomHideTimer = null;
let focusTimer    = null;

const video    = document.getElementById('video');
const canvas   = document.getElementById('capture-canvas');
const focusRing= document.getElementById('focus-ring');
const timerBig = document.getElementById('timer-big');
const flashOv  = document.getElementById('flash-ov');
const zoomHud  = document.getElementById('zoom-hud');
const zoomWrap = document.getElementById('zoom-slider-wrap');
const zoomFill = document.getElementById('zoom-fill');
const zoomInput= document.getElementById('zoom-input');
const zoomBadge= document.getElementById('zoom-badge');
const shutterEl= document.getElementById('shutter');
const shutterIn= document.getElementById('shutter-inner');

// ═══════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════
setInterval(() => {
  const d = new Date();
  document.getElementById('hud-time').textContent =
    d.getHours().toString().padStart(2,'0') + ':' +
    d.getMinutes().toString().padStart(2,'0');
}, 5000);
(() => {
  const d = new Date();
  document.getElementById('hud-time').textContent =
    d.getHours().toString().padStart(2,'0') + ':' +
    d.getMinutes().toString().padStart(2,'0');
})();

// ═══════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════
async function startCam() {
  try {
    const constraints = {
      video: {
        facingMode,
        width:  { ideal: 1920 },
        height: { ideal: 1080 },
        frameRate: { ideal: 30 }
      },
      audio: true
    };
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      document.getElementById('perm-screen').style.display = 'none';
      applyMirror();
    };
  } catch(e) {
    document.querySelector('.perm-sub').textContent =
      '⚠ Izin ditolak. Pastikan buka lewat HTTPS dan izinkan kamera di browser.';
  }
}

async function flipCam() {
  if (!stream) return;
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  stream.getTracks().forEach(t => t.stop());
  // animate button
  document.getElementById('btn-flip-cam').style.transform = 'rotate(360deg)';
  setTimeout(() => document.getElementById('btn-flip-cam').style.transform = '', 300);
  await startCam();
  toast(facingMode === 'user' ? 'KAMERA DEPAN' : 'KAMERA BELAKANG');
  if (navigator.vibrate) navigator.vibrate(40);
}

// ═══════════════════════════════════════
// MIRROR
// ═══════════════════════════════════════
function toggleMirror() {
  isMirrored = !isMirrored;
  applyMirror();
  document.getElementById('btn-mirror').classList.toggle('active', isMirrored);
}

function applyMirror() {
  applyZoomTransform();
}

function applyZoomTransform() {
  const scale  = currentZoom;
  const mirror = isMirrored ? 'scaleX(-1)' : '';
  video.style.transform = `scale(${scale}) ${mirror}`;
}

// ═══════════════════════════════════════
// ZOOM (1× – 100×, digital via CSS scale)
// ═══════════════════════════════════════
function onZoomSlider(val) {
  currentZoom = parseFloat(val);
  applyZoomTransform();
  updateZoomUI();
  resetZoomHideTimer();

  // Try hardware zoom on supported Android
  try {
    const track = stream?.getVideoTracks()[0];
    const caps  = track?.getCapabilities?.();
    if (caps?.zoom) {
      const hwMax = caps.zoom.max;
      const hwZoom = Math.min(currentZoom, hwMax);
      track.applyConstraints({ advanced: [{ zoom: hwZoom }] });
    }
  } catch(_){}
}

function updateZoomUI() {
  const pct = ((currentZoom - 1) / 99) * 100;
  zoomFill.style.width = pct + '%';

  let label;
  if      (currentZoom >= 10)  label = currentZoom.toFixed(0) + '×';
  else if (currentZoom >= 2)   label = currentZoom.toFixed(1) + '×';
  else                          label = currentZoom.toFixed(1) + '×';

  zoomBadge.textContent = label;
  document.getElementById('zoom-badge').textContent = label;
}

function showZoomUI() {
  zoomHud.classList.add('show');
  zoomWrap.classList.add('show');
  zoomVisible = true;
}

function resetZoomHideTimer() {
  showZoomUI();
  clearTimeout(zoomHideTimer);
  zoomHideTimer = setTimeout(() => {
    zoomHud.classList.remove('show');
    zoomWrap.classList.remove('show');
    zoomVisible = false;
  }, 2500);
}

// Quick zoom presets on badge tap
zoomBadge.addEventListener('click', () => {
  const presets = [1, 2, 5, 10, 25, 50, 100];
  const i = presets.findIndex(p => p > currentZoom);
  const next = presets[i === -1 ? 0 : i] ?? 1;
  currentZoom = next;
  zoomInput.value = next;
  onZoomSlider(next);
  if (navigator.vibrate) navigator.vibrate(30);
});

// ═══════════════════════════════════════
// PINCH TO ZOOM
// ═══════════════════════════════════════
let pinchDist0  = 0;
let pinchZoom0  = 1;

document.getElementById('viewfinder').addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    pinchDist0 = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    pinchZoom0 = currentZoom;
  } else if (e.touches.length === 1) {
    // Tap to focus
    handleFocusTap(e.touches[0]);
  }
}, { passive: true });

document.getElementById('viewfinder').addEventListener('touchmove', e => {
  if (e.touches.length !== 2) return;
  e.preventDefault();
  const dist = Math.hypot(
    e.touches[0].clientX - e.touches[1].clientX,
    e.touches[0].clientY - e.touches[1].clientY
  );
  const ratio = dist / pinchDist0;
  let newZoom = Math.min(100, Math.max(1, pinchZoom0 * ratio));
  newZoom = Math.round(newZoom * 10) / 10;
  currentZoom = newZoom;
  zoomInput.value = newZoom;
  applyZoomTransform();
  updateZoomUI();
  resetZoomHideTimer();
}, { passive: false });

// Double-tap flip
let lastTap = 0;
document.getElementById('viewfinder').addEventListener('touchend', e => {
  if (e.touches.length > 0) return;
  const now = Date.now();
  if (now - lastTap < 300) { flipCam(); return; }
  lastTap = now;
});

// ═══════════════════════════════════════
// FOCUS TAP
// ═══════════════════════════════════════
function handleFocusTap(touch) {
  focusRing.style.left  = touch.clientX + 'px';
  focusRing.style.top   = touch.clientY + 'px';
  focusRing.style.width  = '72px';
  focusRing.style.height = '72px';
  focusRing.classList.add('show');
  // Animate to smaller
  setTimeout(() => {
    focusRing.style.width  = '52px';
    focusRing.style.height = '52px';
  }, 80);
  clearTimeout(focusTimer);
  focusTimer = setTimeout(() => focusRing.classList.remove('show'), 1300);
  if (navigator.vibrate) navigator.vibrate(15);
}

// ═══════════════════════════════════════
// FILTER
// ═══════════════════════════════════════
function applyFilter(name, label, el) {
  document.querySelectorAll('.f-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentFilter = name;

  const mirror = isMirrored ? 'mirrored' : '';
  video.className = `f-${name} ${mirror}`;

  document.getElementById('hud-filter-name').textContent = `· ${label}`;
  if (navigator.vibrate) navigator.vibrate(20);
}

// ═══════════════════════════════════════
// GRID
// ═══════════════════════════════════════
function toggleGrid() {
  document.getElementById('grid-ov').classList.toggle('on');
  document.getElementById('btn-grid').classList.toggle('active',
    document.getElementById('grid-ov').classList.contains('on'));
}

// ═══════════════════════════════════════
// MODE
// ═══════════════════════════════════════
function setMode(mode, el) {
  if (isRecording) return;
  currentMode = mode;
  document.querySelectorAll('.mode-seg').forEach(m => m.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('hud-mode').textContent = mode;

  shutterEl.classList.remove('video-mode');
  shutterIn.style.borderRadius = '50%';
  if (mode === 'VIDEO') shutterEl.classList.add('video-mode');
}

// ═══════════════════════════════════════
// TIMER
// ═══════════════════════════════════════
function setTimer(s, el) {
  timerSecs = s;
  document.querySelectorAll('.t-opt').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

// ═══════════════════════════════════════
// SHUTTER
// ═══════════════════════════════════════
function handleShutter() {
  if (!stream) { startCam(); return; }
  if (currentMode === 'VIDEO') { toggleRec(); return; }
  if (timerSecs > 0) { runTimerThen(timerSecs, doCapture); }
  else { doCapture(); }
  if (navigator.vibrate) navigator.vibrate(30);
}

function runTimerThen(secs, cb) {
  let n = secs;
  timerBig.style.display = 'block';
  timerBig.textContent = n;
  const iv = setInterval(() => {
    n--;
    if (n <= 0) {
      clearInterval(iv);
      timerBig.style.display = 'none';
      cb();
    } else {
      timerBig.textContent = n;
    }
  }, 1000);
}

// ═══════════════════════════════════════
// CAPTURE PHOTO
// ═══════════════════════════════════════
function doCapture() {
  if (currentMode === 'BURST') { doBurst(); return; }
  captureOne();
}

function captureOne() {
  const w = video.videoWidth, h = video.videoHeight;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.save();
  if (isMirrored) { ctx.translate(w, 0); ctx.scale(-1, 1); }
  ctx.filter = getComputedStyle(video).filter;
  ctx.drawImage(video, 0, 0, w, h);
  ctx.restore();

  // Flash
  flashOv.style.opacity = 1;
  setTimeout(() => flashOv.style.opacity = 0, 80);

  const url = canvas.toDataURL('image/jpeg', 0.93);
  addShot(url);
  toast('FOTO DISIMPAN');
  if (navigator.vibrate) navigator.vibrate([20, 30, 20]);
}

function doBurst() {
  let c = 0;
  toast('BURST ×5...');
  const iv = setInterval(() => {
    captureOne();
    c++;
    if (c >= 5) { clearInterval(iv); toast('BURST SELESAI'); }
  }, 180);
}

// ═══════════════════════════════════════
// RECORD
// ═══════════════════════════════════════
function toggleRec() {
  if (!isRecording) startRec(); else stopRec();
}

function startRec() {
  recordedChunks = [];
  try {
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
  } catch {
    mediaRecorder = new MediaRecorder(stream);
  }
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = saveVid;
  mediaRecorder.start();
  isRecording = true;
  recSecs = 0;
  shutterEl.classList.add('recording');
  document.getElementById('rec-dot').style.display = 'block';
  document.getElementById('hud-mode').textContent = 'REC';
  recInt = setInterval(() => {
    recSecs++;
    const m = String(Math.floor(recSecs/60)).padStart(2,'0');
    const s = String(recSecs%60).padStart(2,'0');
    document.getElementById('hud-filter-name').textContent = `· ${m}:${s}`;
  }, 1000);
  if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
}

function stopRec() {
  mediaRecorder.stop();
  isRecording = false;
  shutterEl.classList.remove('recording');
  document.getElementById('rec-dot').style.display = 'none';
  document.getElementById('hud-mode').textContent = 'VIDEO';
  document.getElementById('hud-filter-name').textContent = '· NORMAL';
  clearInterval(recInt);
}

function saveVid() {
  const blob = new Blob(recordedChunks, { type: 'video/webm' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `axiom_${Date.now()}.webm`;
  a.click();
  toast('VIDEO TERSIMPAN');
}

// ═══════════════════════════════════════
// GALLERY
// ═══════════════════════════════════════
function addShot(url) {
  shots.unshift(url);
  // Update thumbnail
  const img = document.getElementById('last-img');
  img.src = url; img.style.display = 'block';
  document.querySelector('#last-shot span').style.display = 'none';
  const sc = document.getElementById('shot-count');
  sc.textContent = shots.length;
  sc.style.display = 'block';
  document.getElementById('photo-count-label').textContent = shots.length + ' PHOTOS';
  rebuildGallery();
}

function rebuildGallery() {
  const grid = document.getElementById('gallery-photos');
  grid.innerHTML = '';
  shots.forEach((url, i) => {
    const div = document.createElement('div');
    div.className = 'g-item';
    div.innerHTML = `
      <img src="${url}" alt="shot ${i+1}">
      <span class="g-num">#${shots.length - i}</span>
      <button class="g-dl" onclick="dlShot(${i})">↓</button>
    `;
    div.querySelector('img').onclick = () => openLightbox(url);
    grid.appendChild(div);
  });
}

function openGallery()  { document.getElementById('gallery-sheet').classList.add('open'); }
function closeGallery() { document.getElementById('gallery-sheet').classList.remove('open'); }

function dlShot(i) {
  const a = document.createElement('a');
  a.href = shots[i];
  a.download = `axiom_${Date.now()}.jpg`;
  a.click();
}

// ═══════════════════════════════════════
// LIGHTBOX
// ═══════════════════════════════════════
function openLightbox(url) {
  lbCurrentUrl = url;
  document.getElementById('lb-img').src = url;
  document.getElementById('lightbox').classList.add('on');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('on');
}
function dlLightbox() {
  const a = document.createElement('a');
  a.href = lbCurrentUrl;
  a.download = `axiom_${Date.now()}.jpg`;
  a.click();
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1700);
}

// ═══════════════════════════════════════
// TAP VIEWFINDER = show zoom controls
// ═══════════════════════════════════════
document.getElementById('viewfinder').addEventListener('touchstart', e => {
  if (e.touches.length === 1) showZoomUI();
}, { passive: true });

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
window.onload = startCam;
</script>
</body>
</html>
